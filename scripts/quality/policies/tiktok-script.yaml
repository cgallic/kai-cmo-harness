# TikTok short video script gate
id: tiktok-script
auto_approve_above: 70
hold_between: [45, 70]
reject_below: 45
require_rules_pass:
  - CS-07    # no AI cliches
block_if_terms:
  - "link in bio"
  - "you won't believe"
  - "mind-blowing"
  - "guaranteed"
  - "lose weight"
  - "before and after"
require_policy_ref: harness/references/tiktok-ads-policy-reference.md
notes: |
  Political ads banned globally on TikTok.
  Weight management/body image content heavily restricted.
  AI-generated content requires disclosure (2026 mandatory).
  Spark Ads lock in creator caption — cannot be modified.
  No personalized ads for teens 13-17 in EEA/UK/Switzerland.
